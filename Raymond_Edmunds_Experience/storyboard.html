<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bembridge Fort Trust | Interactive Storyboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --accent: #c8a55e;
            --bg-dark: #0a0c0f;
            --bg-panel: #13151a;
            --text-main: #e5e7eb;
            --text-dim: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Noise Overlay */
        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(200, 165, 94, 0.2);
            background: linear-gradient(180deg, #000, transparent);
            z-index: 10;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .back-btn {
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--accent);
            color: #000;
        }

        /* Main App Grid */
        .app-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 80px);
            /* subtract header */
            overflow: hidden;
        }

        /* Left Side: Timeline List */
        .timeline-panel {
            width: 35%;
            min-width: 350px;
            background: var(--bg-panel);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            overflow-y: auto;
            padding: 2rem 0;
            position: relative;
        }

        /* Custom Scrollbar */
        .timeline-panel::-webkit-scrollbar {
            width: 8px;
        }

        .timeline-panel::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        .timeline-panel::-webkit-scrollbar-thumb {
            background: rgba(200, 165, 94, 0.3);
            border-radius: 4px;
        }

        .timeline-panel::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .timeline-track {
            position: absolute;
            left: 2rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(200, 165, 94, 0.15);
            z-index: 1;
        }

        .timeline-item {
            position: relative;
            z-index: 2;
            margin-left: 2rem;
            padding: 1.5rem 2rem 1.5rem 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px;
            /* center on track */
            top: 2rem;
            width: 14px;
            height: 14px;
            background: var(--bg-panel);
            border: 2px solid var(--accent);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .timeline-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .timeline-item:hover::before {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .timeline-item.active {
            background: rgba(200, 165, 94, 0.08);
            border-left: 3px solid var(--accent);
            margin-left: calc(2rem - 3px);
            /* adjust for border */
        }

        .timeline-item.active::before {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            left: -3px;
            /* readjusted for the margin shift */
        }

        .item-year {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 0.2rem;
            line-height: 1;
        }

        .item-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 0.3rem;
        }

        .item-persona {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Right Side: Detail Panel */
        .detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #050608;
            position: relative;
            overflow-y: auto;
        }

        .hero-banner {
            height: 50%;
            min-height: 300px;
            background-size: cover;
            background-position: center 25%;
            position: relative;
            display: flex;
            align-items: flex-end;
            transition: background-image 0.5s ease-in-out;
        }

        .hero-banner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, #050608 5%, rgba(5, 6, 8, 0.3) 40%, transparent 100%);
        }

        .hero-title-group {
            position: relative;
            z-index: 2;
            padding: 3rem;
            width: 100%;
        }

        .hero-persona {
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .interactive-tabs {
            position: relative;
            z-index: 2;
            padding: 0 3rem 3rem 3rem;
        }

        .tab-buttons {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 1rem 2rem;
            font-size: 1rem;
            font-family: 'Roboto', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .tab-btn:hover {
            color: #fff;
        }

        .tab-btn.active {
            color: var(--accent);
            font-weight: 500;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 -2px 10px rgba(200, 165, 94, 0.5);
        }

        .tab-content {
            display: none;
            animation: fadeInTab 0.4s ease forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeInTab {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 2.5rem;
            font-size: 1.15rem;
            line-height: 1.8;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-left: 4px solid var(--accent);
        }

        .content-icon {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 1rem;
            display: block;
        }

        .instruction-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 0;
            /* behind content when active */
        }

        .instruction-overlay.visible {
            opacity: 0.4;
            z-index: 10;
        }

        @media (max-width: 1024px) {
            .app-container {
                flex-direction: column;
            }

            .timeline-panel {
                width: 100%;
                height: 35vh;
                min-height: 250px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .detail-panel {
                height: 65vh;
            }

            .hero-banner {
                height: 40%;
                min-height: 200px;
            }

            .hero-title {
                font-size: 2.5rem;
            }

            .interactive-tabs {
                padding: 0 1.5rem 2rem 1.5rem;
            }

            .hero-title-group {
                padding: 1.5rem;
            }

            .tab-btn {
                padding: 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div class="film-grain"></div>

    <header>
        <h1>Bembridge Fort | Interactive Lore Board</h1>
        <a href="index.html" class="back-btn">← Return to Hub</a>
    </header>

    <div class="app-container">
        <!-- Timeline Navigation -->
        <div class="timeline-panel" id="timelineList">
            <div class="timeline-track"></div>
            <!-- Populated by JS -->
        </div>

        <!-- Detail Panel -->
        <div class="detail-panel" id="detailPanel" style="display: none;">
            <div class="hero-banner" id="heroBanner">
                <div class="hero-title-group">
                    <div class="hero-persona" id="heroPersona">Persona Name</div>
                    <div class="hero-title" id="heroTitle">The Title</div>
                </div>
            </div>

            <div class="interactive-tabs">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('role')">Role in Fort</button>
                    <button class="tab-btn" onclick="switchTab('morale')">Morale Impact</button>
                    <button class="tab-btn" onclick="switchTab('war')">War Effort</button>
                    <button class="tab-btn" onclick="switchTab('legacy')">Legacy & Impact</button>
                </div>

                <!-- Tab Contents -->
                <div class="tab-content active" id="tab-role">
                    <div class="content-card">
                        <span class="content-icon">🏛️</span>
                        <div id="text-role"></div>
                    </div>
                </div>
                <div class="tab-content" id="tab-morale">
                    <div class="content-card">
                        <span class="content-icon">✨</span>
                        <div id="text-morale"></div>
                    </div>
                </div>
                <div class="tab-content" id="tab-war">
                    <div class="content-card">
                        <span class="content-icon">⚔️</span>
                        <div id="text-war"></div>
                    </div>
                </div>
                <div class="tab-content" id="tab-legacy">
                    <div class="content-card">
                        <span class="content-icon">🕰️</span>
                        <div id="text-legacy"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="instruction-overlay visible" id="instructionOverlay">
            <h2
                style="font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem;">
                Select a Sentinel</h2>
            <p style="font-size: 1.2rem;">Click a timeline entry on the left to uncover their story.</p>
        </div>
    </div>

    <script>
        const storyData = [
            {
                id: "1871",
                year: "1871",
                title: "The Architect of Invariants",
                persona: "Captain of the 103rd Regiment",
                image: "assets/captain_1871_bembridge_1772659602384.png",
                role: "Commanding the Royal Bombay Fusiliers, he arrived from the Indian Mutiny to oversee the 7-inch Armstrong Guns. He treated the fort not as a folly, but as a mathematical certainty.",
                roleImage: { src: "assets/armstrong_gun_1871_1772660688402.png", caption: "7-inch Armstrong RBL Gun" },
                morale: "Imposed strict discipline and order. His pristine drill formations on the chalk parade ground instilled a sense of absolute control and invulnerability among the raw recruits.",
                moraleImage: { src: "assets/captain_drill_1871_1772661257911.png", caption: "Pristine Drill Formation" },
                war: "Maintained the ultimate deterrent—the 'Refusal of the French.' His precise calibration of the defences ensured the island was an impenetrable, bristling fortress.",
                warImage: { src: "assets/fort_courtyard_prime_1772313951961.png", caption: "A Fortification of Certainty" },
                legacy: "He set the 'Sovereign Canon' of precision and invariant truth. His insistence on absolute geometric perfection would be mirrored by precise radar operators 70 years later.",
                legacyImage: null
            },
            {
                id: "1914",
                year: "1914",
                title: "The Forgotten Sentinel",
                persona: "Private Tattersall",
                image: "assets/private_tattersall_1914_1772659616954.png",
                role: "A 'Green Gunner' of the Isle of Wight Rifles. He manned the physical defences during the early days of WWI, staring out into the 'Analogue Fog' over the Solent.",
                roleImage: { src: "assets/private_tattersall_1914_1772659616954.png", caption: "Staring into the Analogue Fog" },
                morale: "Felt utterly forgotten by the mainland Command. Yet, he maintained steadfast vigilance. His mother's letters and his blackened Carisbrooke Badge were his only anchors to humanity.",
                moraleImage: { src: "assets/tattersall_letter_1914_1772660702698.png", caption: "Reading a letter from Home" },
                war: "Provided the vital physical coastal watch before the age of radar, guarding the vulnerable channel against sudden German naval raids and ensuring safe passage for supply convoys.",
                warImage: null,
                legacy: "His isolated, deeply disconnected experience proved the absolute necessity for the 'Wireless' communication revolution that would later physically define the fort's architecture.",
                legacyImage: null
            },
            {
                id: "1940",
                year: "1940",
                title: "The Auditor of the Abyss",
                persona: "Geoffrey Kiddle",
                image: "assets/geoffrey_kiddle_1940_1772659634601.png",
                role: "A former bank manager serving as a Royal Navy Clerk. He spent his days deep in the circular tunnel (now Bar 1867) watching the Pattern 599 Integrator with a stoic 'Ledger mindset'.",
                roleImage: { src: "assets/geoffrey_kiddle_1940_1772659634601.png", caption: "Ledger Mindset in the Vault" },
                morale: "Brought a desperately needed sense of civilian normality and financial precision to a damp, terrifying concrete environment. Found deep 'coziness' and camaraderie among the 45 stationed men, grounding them in reality.",
                moraleImage: { src: "assets/kiddle_christmas_1940_1772660718767.png", caption: "Christmas 1940 with 45 Men" },
                war: "Operated the highly classified underwater HD Loops. When his 'Needle of Truth' twitched, he became the first line of defence tracking encroaching Nazi U-boats sneaking into Spithead.",
                warImage: { src: "assets/submarine_loop_1940_1772660732966.png", caption: "Indicator Loops detecting a U-Boat" },
                legacy: "Proved that ordinary civilians—bankers and clerks—could perform extraordinary, high-stakes technical feats under immense pressure, protecting vital national supply chains.",
                legacyImage: null
            },
            {
                id: "1941",
                year: "1941",
                title: "Greasepaint and Sausages",
                persona: "Raymond Edmunds (The Wonder-Child)",
                image: "assets/raymond_edmunds_1941_1772659648133.png",
                role: "At age 10, the youngest ENSA performer of WWII. Wore greasepaint to school and performed with 'The Stardust Company' on makeshift stages made from carpet-covered packing boxes.",
                roleImage: { src: "assets/the_greasepaint_boy_1772309182259.png", caption: "Stage Makeup at School" },
                morale: "An absolute lifesaver for military morale. Brought a touch of resilient 'Blighty' to thousands of exhausted sailors and soldiers with renditions of 'The Good Ship Lollipop' while bombs fell outside.",
                moraleImage: { src: "assets/sausages_mess_1941_1772660745594.png", caption: "Sizzling Sausages from the Mess" },
                war: "While not firing a gun, his 400+ concerts kept front-line soldiers mentally fighting fit. He gave them a reason to endure, reminding them of the homes, innocence, and children they were explicitly protecting.",
                warImage: { src: "assets/raymond_edmunds_1941_1772659648133.png", caption: "Performing for the Front Line" },
                legacy: "A poignant symbol of wartime innocence and resilience. He 'smuggled sausages' off base for his father and left the stage for a quiet life. His 60-year secret remains the beating human heart of the Fort's history.",
                legacyImage: { src: "assets/churchill_letter_1945_1772660761648.png", caption: "Personal Commendation from Churchill" }
            },
            {
                id: "1942",
                year: "1942",
                title: "The Pilot of the Signal",
                persona: "The Radar Wren",
                image: "assets/radar_wren_1942_1772659667189.png",
                role: "A highly trained WRNS Officer operating the classified Cavity Magnetron radar (AMES Type 41). Working in secret 'months-not-years' teams, she pierced through the sea mist using 'Unnatural Precision.'",
                roleImage: { src: "assets/radar_wren_1942_1772659667189.png", caption: "Piercing the Mist" },
                morale: "Pioneered women's absolutely critical roles in high-stakes combat technology. Her calm deciphering of the foggy radar screens provided a psychological safety net for the entire island.",
                moraleImage: { src: "assets/wrens_plotting_1942_1772660777823.png", caption: "WRNS Secret Plotting Room" },
                war: "Fundamentally shifted the balance of power in the Channel. Her 'Pencil Beam' cut straight through German 'Window' foil, spotting E-boats and enabling the Culver Battery to fire accurately in the dark.",
                warImage: { src: "assets/eboat_wireframe_1942_1772660792583.png", caption: "E-Boats on the Radar display" },
                legacy: "The direct ancestor of modern tech innovators. She definitively proved that small, diverse teams wielding elite cutting-edge technology could outmaneuver and defeat massive conventional enemy forces.",
                legacyImage: null
            },
            {
                id: "2026",
                year: "2026",
                title: "The Architect of Existence",
                persona: "Isabella Campus Apprentice",
                image: "assets/campus_apprentice_2026_1772659681841.png",
                role: "A local youth working at the Seaview Manifestation Desk. They do not merely 'code' but 'command' using the advanced Centaur AI Model to resurrect the Fort's records.",
                roleImage: { src: "assets/campus_apprentice_2026_1772659681841.png", caption: "Bridging the Past with Silicon" },
                morale: "Inspires the modern Isle of Wight community by actively turning a forgotten, crumbling ruin into a vibrant, technologically-linked 'Citadel of Creativity.'",
                moraleImage: { src: "assets/magazine_theatre_2033_1772660806692.png", caption: "The 60-seat Magazine Theatre" },
                war: "Fighting a new kind of modern war—a war against forgetting. Defending the truth of the past from 'narrative noise', historical drift, and digital decay.",
                warImage: { src: "assets/colorizing_history_2026_1772660822468.png", caption: "Defeating Narrative Drift" },
                legacy: "The ultimate 'Graduation' of the 160-year saga. They ensure that the sacrifices of Tattersall, Kiddle, Raymond, and the Wrens will live on forever, bridged through glowing silicon networks.",
                legacyImage: null
            }
        ];

        // Initialize Timeline
        const timelineList = document.getElementById('timelineList');

        storyData.forEach((item, index) => {
            const el = document.createElement('div');
            el.className = 'timeline-item';
            el.dataset.id = item.id;
            el.innerHTML = `
                <div class="item-year">${item.year}</div>
                <div class="item-title">${item.title}</div>
                <div class="item-persona">${item.persona}</div>
            `;
            el.onclick = () => selectCharacter(index, el);
            timelineList.appendChild(el);
        });

        // Current character index globally tracked
        let currentData = null;

        function selectCharacter(index, element) {
            // Update Active Class
            document.querySelectorAll('.timeline-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // Hide instruction, Show detail panel
            document.getElementById('instructionOverlay').classList.remove('visible');
            const panel = document.getElementById('detailPanel');
            panel.style.display = 'flex';

            // Allow layout to render then trigger transition
            setTimeout(() => {
                panel.style.opacity = '1';
            }, 10);

            currentData = storyData[index];

            // Update Hero
            document.getElementById('heroBanner').style.backgroundImage = `url('${currentData.image}')`;
            document.getElementById('heroTitle').innerText = currentData.title;
            document.getElementById('heroPersona').innerText = currentData.persona;

            // Fill all content dynamically and prep images
            const tabs = ['role', 'morale', 'war', 'legacy'];
            tabs.forEach(tab => {
                const textEl = document.getElementById(`text-${tab}`);
                if (textEl) {
                    textEl.innerText = currentData[tab];

                    // Clear old gallery
                    const parentCard = textEl.parentElement;
                    const oldGallery = parentCard.querySelector('.tab-specific-gallery');
                    if (oldGallery) oldGallery.remove();

                    // Generate tab specific gallery if image exists
                    const imgObj = currentData[`${tab}Image`];
                    if (imgObj) {
                        const html = `
                            <div class="tab-specific-gallery" style="margin-top: 2rem; overflow: hidden; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); position: relative;">
                                <img src="${imgObj.src}" alt="${imgObj.caption}" style="width: 100%; display: block; filter: contrast(1.1) brightness(0.9); transition: transform 0.3s ease;">
                                <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 1.5rem 1rem 1rem;">
                                    <span style="color: var(--accent); font-family: 'Playfair Display', serif; font-size: 1.2rem; letter-spacing: 1px;">${imgObj.caption}</span>
                                </div>
                            </div>
                        `;
                        parentCard.insertAdjacentHTML('beforeend', html);
                    }
                }
            });

            // Reset to first tab
            switchTab('role');
        }

        function switchTab(tabId) {
            // Update buttons
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(tabId)) {
                    btn.classList.add('active');
                }
            });

            // Update content panels
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => {
                content.classList.remove('active');
                if (content.id === `tab-${tabId}`) {
                    content.classList.add('active');
                }
            });
        }
    </script>
</body>

</html>
